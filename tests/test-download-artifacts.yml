name: Test download artifacts configuration
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          host: "gitlab.com"
          id: "99999999"
          ref: "main"
          trigger_token: "invalid-token"
          access_token: "invalid-access-token"
          download_artifacts: "true"
          download_artifacts_on_failure: "true"
          download_job_logs: "true"
          fail_if_no_artifacts: "false"
          download_path: "./test-downloads"
          verbose: "true"

      - name: Assert action ran with download config (fails due to invalid credentials)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected outcome to be 'failure' with invalid credentials, got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid credentials when download config provided"

      - name: Assert artifacts_downloaded output is set
        env:
          ARTIFACTS_DOWNLOADED: ${{ steps.action.outputs.artifacts_downloaded }}
        run: |
          echo "artifacts_downloaded: '$ARTIFACTS_DOWNLOADED'"
          # With invalid credentials, artifacts_downloaded should be false or empty
          # We just verify the output is accessible
          echo "PASS: artifacts_downloaded output checked"
