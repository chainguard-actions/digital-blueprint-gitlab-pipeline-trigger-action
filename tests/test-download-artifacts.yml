name: Test trigger with artifact download options
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          host: "gitlab.com"
          id: "99999999"
          ref: "main"
          trigger_token: "invalid-token"
          access_token: "invalid-access-token"
          download_artifacts: "true"
          download_artifacts_on_failure: "true"
          download_job_logs: "true"
          fail_if_no_artifacts: "false"
          download_path: "./test-downloads"
          verbose: "true"

      - name: Assert action failed gracefully with artifact download options
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid credentials, got outcome='$OUTCOME'"
            exit 1
          fi
          echo "PASS: action failed as expected with artifact download options set"

      - name: Assert artifacts_downloaded output is accessible
        env:
          ARTIFACTS_DOWNLOADED: ${{ steps.action.outputs.artifacts_downloaded }}
        run: |
          echo "artifacts_downloaded: '$ARTIFACTS_DOWNLOADED'"
          # On failure, this may be empty or false
          echo "PASS: artifacts_downloaded output is accessible"
