name: Test download artifacts requires access token
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          host: "gitlab.com"
          id: "my-project"
          ref: "main"
          trigger_token: "fake-trigger-token"
          download_artifacts: "true"
          # access_token intentionally omitted to trigger validation error
      - name: Assert action failed due to missing access token
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" != "failure" ]; then
            echo "FAIL: expected action to fail when download_artifacts=true but no access_token provided"
            exit 1
          fi
          echo "PASS: action correctly failed when access_token is missing for artifact download"
