name: Test GitLab pipeline trigger with custom host and variables
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: trigger
        uses: .
        continue-on-error: true
        with:
          host: "gitlab.example.com"
          id: "12345"
          ref: "develop"
          trigger_token: "fake-trigger-token"
          access_token: "fake-access-token"
          variables: '{ "VAR1": "value1", "VAR2": "value2" }'

      - name: Assert action ran (not skipped)
        run: |
          echo "outcome: ${{ steps.trigger.outcome }}"
          if [ "${{ steps.trigger.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with custom host and variables (outcome=${{ steps.trigger.outcome }})"

      - name: Assert web_url output is set or action failed gracefully
        run: |
          WEB_URL="${{ steps.trigger.outputs.web_url }}"
          echo "web_url output: '$WEB_URL'"
          # If the action succeeded, web_url must be non-empty
          if [ "${{ steps.trigger.outcome }}" = "success" ] && [ -z "$WEB_URL" ]; then
            echo "FAIL: action succeeded but web_url output is empty"
            exit 1
          fi
          echo "PASS: web_url output handling is correct"
