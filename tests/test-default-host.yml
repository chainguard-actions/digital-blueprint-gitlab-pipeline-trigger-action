name: Test default host and variables defaults
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with default host (omitted)
        id: action
        uses: .
        continue-on-error: true
        with:
          id: "99999999"
          ref: "main"
          trigger_token: "fake-trigger-token"
          variables: "{}"

      - name: Assert action failed gracefully (not a JS crash)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # Without a real token the action must fail, not crash the runner
          if [ "$OUTCOME" = "success" ]; then
            echo "FAIL: expected action to fail with fake credentials"
            exit 1
          fi
          echo "PASS: action failed as expected (default host used, invalid token)"
