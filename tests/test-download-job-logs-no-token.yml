name: Test download_job_logs requires access_token
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          host: "gitlab.com"
          id: "some-project"
          ref: "main"
          trigger_token: "some-trigger-token"
          download_job_logs: "true"
          # access_token intentionally omitted to trigger validation error
          verbose: "false"

      - name: Assert action failed due to missing access_token for job logs
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" != "failure" ]; then
            echo "FAIL: expected action to fail when download_job_logs=true but access_token is missing"
            exit 1
          fi
          echo "PASS: action correctly failed when access_token is missing for job log download"
