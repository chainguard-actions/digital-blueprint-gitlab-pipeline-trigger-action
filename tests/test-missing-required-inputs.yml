name: Test missing required inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with empty trigger_token (expect failure)
        id: action
        uses: .
        continue-on-error: true
        with:
          host: gitlab.com
          id: "test-group/test-project"
          ref: "main"
          trigger_token: ""

      - name: Assert action failed due to missing token
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with empty trigger_token, got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action failed as expected with empty trigger_token"
