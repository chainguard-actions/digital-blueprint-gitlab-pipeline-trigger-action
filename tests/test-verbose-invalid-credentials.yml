name: Test verbose mode with invalid credentials
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          host: "gitlab.com"
          id: "nonexistent-project-99999999"
          ref: "main"
          trigger_token: "invalid-token-verbose-test"
          verbose: "true"

      - name: Assert action failed as expected in verbose mode
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid credentials in verbose mode, but got: ${{ steps.action.outcome }}"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid credentials in verbose mode"
