name: Test basic invocation with invalid credentials
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with invalid credentials (expect failure)
        id: action
        uses: .
        continue-on-error: true
        with:
          host: gitlab.com
          id: "some-group/some-project"
          ref: "main"
          trigger_token: "invalid-token-for-testing"

      - name: Assert action failed (not crashed unexpectedly)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid credentials, got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action failed as expected with invalid credentials"
