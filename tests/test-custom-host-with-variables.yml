name: Test custom host with pipeline variables
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with custom host and variables (expect failure due to invalid credentials)
        id: action
        uses: .
        continue-on-error: true
        with:
          host: my-gitlab.example.com
          id: "42"
          ref: "develop"
          trigger_token: "fake-trigger-token"
          access_token: "fake-access-token"
          variables: '{ "VAR1": "value1", "VAR2": "value2" }'

      - name: Assert action failed (network/auth error expected)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid credentials/host, got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action failed as expected with invalid host and credentials"
