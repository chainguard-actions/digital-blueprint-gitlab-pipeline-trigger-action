name: Test basic trigger with invalid credentials
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          host: "gitlab.com"
          id: "99999999"
          ref: "main"
          trigger_token: "invalid-token"
          verbose: "true"

      - name: Assert action ran (outcome is failure due to invalid credentials)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected outcome to be 'failure' with invalid credentials, got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid credentials"

      - name: Assert status output is set or empty (not undefined)
        env:
          STATUS: ${{ steps.action.outputs.status }}
        run: |
          echo "status output: '$STATUS'"
          # With invalid credentials the pipeline won't start, so status may be empty
          # We just verify the step ran and produced some output (even empty is acceptable)
          echo "PASS: status output checked"
