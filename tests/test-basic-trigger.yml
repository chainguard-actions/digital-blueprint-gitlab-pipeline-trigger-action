name: Test basic GitLab pipeline trigger (invalid credentials)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: trigger
        uses: .
        continue-on-error: true
        with:
          host: gitlab.com
          id: "some-group/some-project"
          ref: main
          trigger_token: "invalid-token-for-testing"

      - name: Assert action ran and produced an outcome
        run: |
          echo "outcome: ${{ steps.trigger.outcome }}"
          # The action should either succeed or fail — but not be skipped
          if [ "${{ steps.trigger.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome=${{ steps.trigger.outcome }})"

      - name: Assert status output is set or action failed gracefully
        run: |
          STATUS="${{ steps.trigger.outputs.status }}"
          echo "status output: '$STATUS'"
          # If the action succeeded (unlikely with invalid token), status must be non-empty
          if [ "${{ steps.trigger.outcome }}" = "success" ] && [ -z "$STATUS" ]; then
            echo "FAIL: action succeeded but status output is empty"
            exit 1
          fi
          echo "PASS: status output handling is correct"
