name: Test basic trigger with invalid credentials
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          host: "gitlab.com"
          id: "99999999"
          ref: "main"
          trigger_token: "invalid-token"
          verbose: "true"

      - name: Assert action failed gracefully with invalid credentials
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid credentials, got outcome='$OUTCOME'"
            exit 1
          fi
          echo "PASS: action failed as expected with invalid credentials"

      - name: Assert status output is set or empty (not unset variable error)
        env:
          STATUS: ${{ steps.action.outputs.status }}
        run: |
          echo "status output: '$STATUS'"
          # Status may be empty on failure, but the variable should be accessible
          echo "PASS: status output is accessible"
