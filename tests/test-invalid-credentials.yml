name: Test invalid credentials
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          host: "https://invalid-gitlab-host.example.invalid"
          id: "my-project"
          ref: "main"
          trigger_token: "fake-trigger-token"
      - name: Assert action failed due to invalid credentials
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid credentials, but outcome was '${{ steps.action.outcome }}'"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid credentials"
