name: Test invalid credentials handling
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with invalid credentials
        id: action
        uses: .
        continue-on-error: true
        with:
          host: gitlab.com
          id: "99999999"
          ref: "main"
          trigger_token: "fake-trigger-token"
          verbose: "true"

      - name: Assert action failed (not a JS crash)
        env:
          OUTCOME: ${{ steps.action.outcome }}
          STATUS: ${{ steps.action.outputs.status }}
        run: |
          echo "outcome: $OUTCOME"
          echo "status: $STATUS"
          # The action should fail (not succeed) with invalid credentials
          if [ "$OUTCOME" = "success" ]; then
            echo "FAIL: expected action to fail with invalid credentials"
            exit 1
          fi
          echo "PASS: action failed as expected with invalid credentials"
