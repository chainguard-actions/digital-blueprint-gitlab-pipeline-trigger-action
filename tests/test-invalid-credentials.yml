name: Test invalid credentials error handling
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with invalid credentials (expect failure)
        id: action
        uses: .
        with:
          host: gitlab.com
          id: "99999999"
          ref: main
          trigger_token: invalid-token
        continue-on-error: true
      - name: Assert action failed due to invalid credentials
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid credentials, but got outcome '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid credentials"
