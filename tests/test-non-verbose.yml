name: Test trigger with verbose disabled (default)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          host: "gitlab.com"
          id: "99999999"
          ref: "main"
          trigger_token: "invalid-token"
          verbose: "false"

      - name: Assert action failed gracefully with verbose disabled
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid credentials, got outcome='$OUTCOME'"
            exit 1
          fi
          echo "PASS: action failed as expected with verbose=false"

      - name: Assert web_url output is accessible
        env:
          WEB_URL: ${{ steps.action.outputs.web_url }}
        run: |
          echo "web_url: '$WEB_URL'"
          # On failure before pipeline creation, web_url will be empty
          echo "PASS: web_url output is accessible"
