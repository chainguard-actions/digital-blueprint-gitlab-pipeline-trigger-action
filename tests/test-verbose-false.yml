name: Test verbose false (default) mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with verbose disabled (default)
        id: action
        uses: .
        continue-on-error: true
        with:
          host: gitlab.com
          id: "99999999"
          ref: "main"
          trigger_token: "fake-trigger-token"
          verbose: "false"

      - name: Assert action failed gracefully without verbose output
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # With invalid credentials the action must fail
          if [ "$OUTCOME" = "success" ]; then
            echo "FAIL: expected action to fail with invalid credentials"
            exit 1
          fi
          echo "PASS: action failed as expected in non-verbose mode"
