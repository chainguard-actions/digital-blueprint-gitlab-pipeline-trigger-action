name: Test custom GitLab host
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          host: "gitlab.example-nonexistent-host.invalid"
          id: "mygroup/myproject"
          ref: "main"
          trigger_token: "fake-trigger-token"
          verbose: "true"

      - name: Assert action failed due to unreachable host
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected outcome to be 'failure' with unreachable host, got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed with unreachable host"
