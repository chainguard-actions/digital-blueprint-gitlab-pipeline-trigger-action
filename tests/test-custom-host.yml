name: Test pipeline trigger with custom host
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with custom host (expect failure due to invalid credentials)
        id: action
        uses: .
        with:
          host: mygitlab.example.com
          id: "12345"
          ref: develop
          trigger_token: fake-trigger-token
          access_token: fake-access-token
        continue-on-error: true
      - name: Assert action failed gracefully with custom host
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with unreachable custom host, but got outcome '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when custom host is unreachable"
